name: Build and Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest
        
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
        
    - name: Setup pnpm cache
      uses: actions/cache@v5
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
          
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Build project
      run: pnpm build
      
    - name: Verify build output
      run: |
        if [ ! -d "./out" ]; then
          echo "Build output directory './out' not found!"
          exit 1
        fi
        echo "Build output directory exists with $(find ./out -type f | wc -l) files"
        
    - name: Create zip archive
      run: |
        cd out
        zip -r ../steem-com-build.zip . -x "*.DS_Store" "*.git*"
        
    - name: Generate timestamp tag
      id: version
      run: |
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")
        echo "version=$TIMESTAMP" >> $GITHUB_OUTPUT
        echo "tag=$TIMESTAMP" >> $GITHUB_OUTPUT
        
    - name: Create Release and upload asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Build ${{ steps.version.outputs.tag }}
        body: |
          ## Steem Official Website Build Release

          This release contains the built static files for the Steem official website.

          ### What's included:
          - Static HTML files
          - CSS and JavaScript assets
          - Images and other static resources

          ### Installation:
          1. Download the `steem-com-build.zip` file
          2. Extract the contents to your web server
          3. Configure your web server to serve the static files

          ### Build Info:
          - Build timestamp: ${{ steps.version.outputs.tag }}
          - Node.js version: 24
          - Build number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
        files: steem-com-build.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
